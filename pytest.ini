[pytest]
addopts = -s -v
python_files = *_tests.py test_*.py
python_classes = Test*
python_functions = test_*

markers =
    users: Маркировка тестов, связанных с пользователями.
    regression: Маркировка для регрессионных тестов.
    authentication: Маркировка тестов, связанных с авторизацией.
    files: Маркировка тестов, связанных с файлами.
    courses: Маркировка тестов, связанных с курсами.
    exercises: Маркировка тестов, связанных с заданиями.